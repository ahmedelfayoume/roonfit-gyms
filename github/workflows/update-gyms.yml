name: Update gyms.json

# بيتشغّل تلقائيًا كل أسبوع + زرار تشغيل يدوي + أول ما تضيف الملف ده.
on:
  workflow_dispatch: {}
  schedule:
    - cron: '0 3 * * 1'          # كل يوم اتنين الساعة 3 صباحًا (UTC)
  push:
    paths:
      - '.github/workflows/update-gyms.yml'

permissions:
  contents: write

concurrency:
  group: update-gyms
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch gyms from OpenStreetMap (Overpass)
        run: |
          python3 - << 'PY'
          #!/usr/bin/env python3
          # ──────────────────────────────────────────────────────────────────────────────────────────────
          #  يجيب جيمات مصر من OpenStreetMap (Overpass) ويكتب gyms.json بالصيغة اللي التطبيق بيقراها.
          #
          #  إنت مش محتاج تشغّله بإيدك — GitHub Actions بيشغّله تلقائيًا (راجع gyms-repo/README.md).
          #  للتشغيل المحلي لو حبيت:  GYMS_OUT=gyms.json python3 scripts/fetch_gyms.py
          #
          #  بيجرّب أكتر من سيرفر Overpass ومعاه إعادة محاولة، وفيه أمان إنه ميمسحش ملف كويس بنتيجة ناقصة.
          #  البيانات © مساهمو OpenStreetMap (رخصة ODbL) — حقائق (اسم/موقع)، آمنة للاستخدام مع ذكر المصدر.
          # ──────────────────────────────────────────────────────────────────────────────────────────────
          import json, sys, os, time, urllib.request, urllib.parse

          # سيرفرات Overpass (مرايا) — نجرّبها بالترتيب لحد ما واحدة تنجح.
          MIRRORS = [
              "https://overpass-api.de/api/interpreter",
              "https://overpass.kumi.systems/api/interpreter",
              "https://overpass.private.coffee/api/interpreter",
              "https://maps.mail.ru/osm/tools/overpass/api/interpreter",
          ]

          # كل الجيمات/مراكز اللياقة في مصر.
          QUERY = """
          [out:json][timeout:180];
          area["ISO3166-1"="EG"][admin_level=2]->.eg;
          (
            nwr["leisure"="fitness_centre"](area.eg);
            nwr["leisure"="sports_centre"]["sport"~"fitness|gym|weightlifting|bodybuilding"](area.eg);
            nwr["sport"~"fitness|bodybuilding|weightlifting"]["name"](area.eg);
          );
          out center tags;
          """

          def fetch():
              body = urllib.parse.urlencode({"data": QUERY}).encode()
              last = None
              for base in MIRRORS:
                  for attempt in range(3):
                      try:
                          req = urllib.request.Request(base, data=body,
                                                       headers={"User-Agent": "Roonfit-gyms/1.0 (github actions)"})
                          with urllib.request.urlopen(req, timeout=200) as r:
                              print(f"[ok] {base}", file=sys.stderr)
                              return json.load(r)
                      except Exception as e:
                          last = e
                          print(f"[retry] {base} attempt {attempt+1}: {e}", file=sys.stderr)
                          time.sleep((2 ** attempt) * 2)
              raise SystemExit(f"كل سيرفرات Overpass فشلت: {last}")

          def clean(s):
              return (s or "").strip()

          def main():
              payload = fetch()
              out, seen = [], set()
              for el in payload.get("elements", []):
                  t = el.get("tags", {})
                  name = clean(t.get("name:ar")) or clean(t.get("name")) or clean(t.get("name:en"))
                  if not name:
                      continue
                  lat = el.get("lat") or (el.get("center") or {}).get("lat")
                  lng = el.get("lon") or (el.get("center") or {}).get("lon")
                  if lat is None or lng is None:
                      continue
                  gid = f"osm_{el['type']}_{el['id']}"
                  if gid in seen:
                      continue
                  seen.add(gid)
                  city = clean(t.get("addr:city")) or clean(t.get("addr:governorate")) or clean(t.get("is_in:city"))
                  area = clean(t.get("addr:suburb")) or clean(t.get("addr:district")) or clean(t.get("addr:neighbourhood"))
                  rec = {"id": gid, "name": name, "city": city,
                         "lat": round(float(lat), 6), "lng": round(float(lng), 6), "source": "osm"}
                  if area:
                      rec["area"] = area
                  out.append(rec)

              out.sort(key=lambda g: (g["city"], g["name"]))

              path = os.environ.get("GYMS_OUT", "gyms.json")
              # أمان: متكتبش نتيجة ناقصة فوق ملف كويس موجود (لو Overpass رجّع جزء بس).
              prev = 0
              if os.path.exists(path):
                  try:
                      prev = len(json.load(open(path, encoding="utf-8")))
                  except Exception:
                      prev = 0
              if len(out) < 20 and prev > len(out):
                  print(f"[skip] نتيجة صغيرة ({len(out)}) والملف القديم فيه {prev} — سيبناه زيّه.", file=sys.stderr)
                  return

              with open(path, "w", encoding="utf-8") as f:
                  json.dump(out, f, ensure_ascii=False, separators=(",", ":"))
              print(f"[done] {len(out)} جيم -> {path}", file=sys.stderr)

          if __name__ == "__main__":
              main()
          PY

      - name: Commit gyms.json if it changed
        run: |
          git add gyms.json
          if git diff --cached --quiet; then
            echo "لا تغيير في gyms.json — الملف زيّه."
            exit 0
          fi
          git config user.name  "roonfit-gyms-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: update gyms.json from OpenStreetMap"
          git push
